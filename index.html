<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Mumma ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap"
          rel="stylesheet">

</head>

<body>


    <!-- Netflix Intro Video -->

    <section id="videoSection">

        <video
            id="introVideo"
            autoplay
            muted
            playsinline>

            <source
                src="videos/netflix.mp4"
                type="video/mp4">

        </video>
        <audio id="introMusic">

        <source
        src="audio/intro.mp3"
        type="audio/mpeg">

</audio>

    </section>

    <!-- Login Screen -->

    <section id="loginSection">

        <div class="login-card">

            <h1>HANNAH STUDIOS</h1>

            <p>
                Tonight's premiere is reserved for someone very special... ❤️
            </p>

            <input
                type="text"
                id="userName"
                placeholder="Who is watching today?">

            <button id="continueBtn">

                Continue →

            </button>

        </div>

    </section>

    <!-- Welcome Screen -->

    <section id="welcomeSection">

    <div class="welcome-content">

        <p class="small-text">

            Welcome,

        </p>

        <h1 id="welcomeText">

        </h1>

    </div>

    </section>

    <!-- =========================
     PROFILE PAGE
========================= -->

<section id="profilePage">

    <!-- Navigation -->

    <nav class="navbar">

        <div class="logo">

            HANNAH STUDIOS

        </div>

        <ul class="nav-links">

            <li>Home</li>
            <li>Memories</li>
            <li>About Amma</li>

        </ul>

    </nav>

    <div class="hero">

    <!-- LEFT -->

    <div class="hero-left">

        <p class="studio">

            HANNAH STUDIOS ORIGINAL

        </p>

        <h1>

            THE STORY OF<br>
            MY FAVOURITE WOMAN

        </h1>

        <p class="description">

            A story of unconditional love,
            endless sacrifices,
            and the strongest woman
            I've ever known.

        </p>

        <div class="rating">

            ⭐⭐⭐⭐⭐

        </div>

        <button
            class="playButton"
            id="playBtn">

    ▶ Begin Watching

        </button>

    </div>

    <!-- RIGHT -->

    <div class="hero-right">

        <img
            src="images/mumm.jpeg"
            alt="Mumma">

    </div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
